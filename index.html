<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css">
  </head>
  <body>

<button class="menu-but" id="menu-but">
    <i class="fa-solid fa-bars"></i>
</button>

    <div class="container">
      <input type="text" id="input-screen" disabled/>
      <div class="buttons-container">
        <button class="number-key">1</button>
        <button class="number-key">2</button>
        <button class="number-key">3</button>
        <button class="number-key sign">+</button>
        <br>
        <button class="number-key">4</button>
        <button class="number-key">5</button>
        <button class="number-key">6</button>
        <button class="number-key sign">-</button>
        <br>
        <button class="number-key">7</button>
        <button class="number-key">8</button>
        <button class="number-key">9</button>
        <button class="number-key sign">x</button>
        <br>
        <button class="number-key">0</button>
        <button class="number-key">.</button>
        <button class="number-key sign">=</button>
        <button class="number-key sign">/</button>
      </div>
    </div>

<section class="menu-section" id="menu-screen">
    <button class="menu-btn">Currancy</button>
    <button class="menu-btn">Weight</button>
    <button class="menu-btn">Temperatuer</button>
    <button class="menu-btn">Distance</button>
</section>


    <script src="main.js"></script>
  </body>
</html>

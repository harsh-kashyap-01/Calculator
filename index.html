<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
    />
  </head>
  <body>
    <button class="menu-but" id="menu-but">
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="container">
      <input type="text" id="input-screen" disabled />
      <div class="buttons-container">
        <button class="number-key clear-btn special-btn btn">C</button>
        <button class="number-key special-btn" onclick="cut()">
          <i class="fas fa-backspace"></i>
        </button>
        <br />
        <button class="number-key btn">1</button>
        <button class="number-key btn">2</button>
        <button class="number-key btn">3</button>
        <button class="number-key btn sign">+</button>
        <br />
        <button class="number-key btn">4</button>
        <button class="number-key btn">5</button>
        <button class="number-key btn">6</button>
        <button class="number-key btn sign">-</button>
        <br />
        <button class="number-key btn">7</button>
        <button class="number-key btn">8</button>
        <button class="number-key btn">9</button>
        <button class="number-key btn sign">x</button>
        <br />
        <button class="number-key btn">0</button>
        <button class="number-key btn">.</button>
        <button class="number-key btn sign">=</button>
        <button class="number-key btn sign">/</button>
      </div>
    </div>

    <section class="menu-section" id="menu-screen">
      <button class="menu-btn">Currancy</button>
      <button class="menu-btn">Weight</button>
      <button class="menu-btn">Temperatuer</button>
      <button class="menu-btn">Distance</button>
    </section>

    <script src="main.js"></script>
  </body>
</html>

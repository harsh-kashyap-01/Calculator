<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
    />
  </head>
  <body>
    <button class="menu-but theme" id="menu-but">
      <i class="fa-solid fa-bars"></i>
    </button>

    <div class="container">
      <input type="text" id="input-screen" disabled/>
      <div class="buttons-container">
        <button class="number-key clear-btn special-btn btn" onclick="clear()">C</button>
        <button class="number-key special-btn theme" onclick="cut()">
          <i class="fas fa-backspace"></i>
        </button>
        <br />
        <button class="number-key btn theme">1</button>
        <button class="number-key btn theme">2</button>
        <button class="number-key btn theme">3</button>
        <button class="number-key btn sign">+</button>
        <br />
        <button class="number-key btn theme">4</button>
        <button class="number-key btn theme">5</button>
        <button class="number-key btn theme">6</button>
        <button class="number-key btn sign">-</button>
        <br />
        <button class="number-key btn theme">7</button>
        <button class="number-key btn theme">8</button>
        <button class="number-key btn theme">9</button>
        <button class="number-key btn sign">*</button>
        <br />
        <button class="number-key btn theme">0</button>
        <button class="number-key btn theme">.</button>
        <button class="number-key sign" onclick="answer()">=</button>
        <button class="number-key btn sign">/</button>
      </div>
    </div>

    <section class="menu-section" id="menu-screen">
      <button class="menu-btn">Currancy</button>
      <button class="menu-btn">Weight</button>
      <button class="menu-btn">Temperatuer</button>
      <button class="menu-btn">Distance</button>
      <button class="menu-btn" onclick="theme()" id="theme-btn">Theme - Dark</button>
    </section>

    <script src="main.js"></script>
    <script src="theme.js"></script>
  </body>
</html>
